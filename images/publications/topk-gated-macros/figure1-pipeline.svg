<svg width="1680" height="960" viewBox="0 0 1680 960" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Top-K gated macro-actions end-to-end architecture</title>
  <desc id="desc">A clear five-stage pipeline showing data generation, AVI training, macro discovery, optional utility scoring, and gated search, with labeled arrows for training flow, optional filtering, and top-K deployment.</desc>

  <defs>
    <linearGradient id="bg" x1="48" y1="40" x2="1632" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8EE"/>
      <stop offset="1" stop-color="#EFFBFF"/>
    </linearGradient>

    <filter id="shadow" x="0" y="0" width="1680" height="960" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>

    <marker id="arrowGray" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2L12 7L2 12V2Z" fill="#6B7280"/>
    </marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2L12 7L2 12V2Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2L12 7L2 12V2Z" fill="#0F766E"/>
    </marker>
    <marker id="arrowViolet" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2L12 7L2 12V2Z" fill="#7C3AED"/>
    </marker>
  </defs>

  <rect x="24" y="24" width="1632" height="912" rx="34" fill="url(#bg)"/>

  <text x="840" y="72" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    Top-K Gated Macro-Actions: End-to-End Pipeline
  </text>
  <text x="840" y="106" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">
    Training discovers useful macros; search deploys only the top-K macro successors.
  </text>

  <g filter="url(#shadow)">
    <rect x="90" y="340" width="250" height="210" rx="20" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="3"/>
    <rect x="112" y="356" width="206" height="36" rx="11" fill="#6B7280"/>
    <text x="215" y="380" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Data Generation</text>
    <text x="215" y="432" text-anchor="middle" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="600">Backward walks</text>
    <text x="215" y="466" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">from goal</text>
    <text x="215" y="500" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">k ~ U[1, k_max]</text>

    <rect x="390" y="340" width="250" height="210" rx="20" fill="#FFFFFF" stroke="#60A5FA" stroke-width="3"/>
    <rect x="412" y="356" width="206" height="36" rx="11" fill="#2563EB"/>
    <text x="515" y="380" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">AVI Training</text>
    <text x="515" y="428" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="600">Bellman targets</text>
    <text x="515" y="460" text-anchor="middle" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="18">y(s) = min_a [c +</text>
    <text x="515" y="490" text-anchor="middle" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="18">h_theta^-]</text>
    <text x="515" y="522" text-anchor="middle" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="20">update h_theta</text>

    <rect x="690" y="340" width="250" height="210" rx="20" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="3"/>
    <rect x="712" y="356" width="206" height="36" rx="11" fill="#0F766E"/>
    <text x="815" y="380" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Macro Discovery</text>
    <text x="815" y="428" text-anchor="middle" fill="#115E59" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600">GBFS with h_theta</text>
    <text x="815" y="460" text-anchor="middle" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="19">pattern mining</text>
    <text x="815" y="490" text-anchor="middle" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="18">lengths 2-5</text>
    <text x="815" y="520" text-anchor="middle" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="18">tau = 3</text>

    <rect x="990" y="340" width="250" height="210" rx="20" fill="#FFFFFF" stroke="#A78BFA" stroke-width="3" stroke-dasharray="10 10"/>
    <rect x="1012" y="356" width="206" height="36" rx="11" fill="#7C3AED"/>
    <text x="1115" y="380" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Utility Scoring</text>
    <text x="1115" y="430" text-anchor="middle" fill="#5B21B6" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="600">u(m) ranking</text>
    <text x="1115" y="466" text-anchor="middle" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="20">top-N filtering</text>
    <text x="1115" y="500" text-anchor="middle" fill="#6D28D9" font-family="Arial, Helvetica, sans-serif" font-size="18" font-style="italic">optional ablation</text>

    <rect x="1290" y="340" width="250" height="210" rx="20" fill="#FFFFFF" stroke="#FB923C" stroke-width="3"/>
    <rect x="1312" y="356" width="206" height="36" rx="11" fill="#EA580C"/>
    <text x="1415" y="380" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Gated Search</text>
    <text x="1415" y="428" text-anchor="middle" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600">Batch weighted A*</text>
    <text x="1415" y="460" text-anchor="middle" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="19">top-K gate on</text>
    <text x="1415" y="490" text-anchor="middle" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="19">h_theta</text>
    <text x="1415" y="522" text-anchor="middle" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="20">+ all primitives</text>
  </g>

  <path d="M340 446H390" stroke="#6B7280" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowGray)"/>
  <text x="365" y="320" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600">states + targets</text>

  <path d="M640 446H690" stroke="#2563EB" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="665" y="320" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600">h_theta checkpoints</text>

  <path d="M940 404H970C982 404 990 396 990 384V286C990 274 998 266 1010 266H1268C1280 266 1290 276 1290 288V404" stroke="#0F766E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/>
  <rect x="1024" y="224" width="182" height="30" rx="15" fill="#FFFFFF" stroke="#99F6E4" stroke-width="1.5"/>
  <text x="1115" y="244" text-anchor="middle" fill="#0F766E" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">all learned macros</text>

  <path d="M940 580H990" stroke="#0F766E" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowTeal)"/>
  <text x="965" y="606" text-anchor="middle" fill="#0F766E" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600">P candidates</text>

  <path d="M1240 580H1290" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowViolet)"/>
  <text x="1265" y="606" text-anchor="middle" fill="#6D28D9" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600">top-N subset</text>

  <path d="M515 340V156C515 144 525 134 537 134H1393C1405 134 1415 144 1415 156V340" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 10" marker-end="url(#arrowBlue)"/>
  <rect x="841" y="176" width="148" height="28" rx="14" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="915" y="195" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">trained h_theta</text>

  <path d="M515 550V692C515 704 505 714 493 714H237C225 714 215 704 215 692V550" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 10" marker-end="url(#arrowBlue)"/>
  <rect x="251" y="726" width="228" height="28" rx="14" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="365" y="745" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">theta^- &lt;- theta sync</text>

  <text x="215" y="806" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="18" font-style="italic">offline (training)</text>
  <text x="515" y="806" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="18" font-style="italic">offline (training)</text>
  <text x="815" y="806" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="18" font-style="italic">offline (mining)</text>
  <text x="1115" y="806" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="18" font-style="italic">offline (scoring)</text>
  <text x="1415" y="806" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="18" font-style="italic">online (search)</text>

</svg>
